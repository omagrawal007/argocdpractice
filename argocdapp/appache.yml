apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: apache-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/omagrawal007/argocdpractice.git
    targetRevision: main
    path: menifest/apache

  destination:
    server: https://kubernetes.default.svc
    namespace: apache

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true